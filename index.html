<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pop-up Generator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        .panel h2 {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .help-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 400px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            background-color: #f1f5f9;
            color: #1e293b;
            white-space: pre;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }
        
        .btn.btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            margin-top: 1rem;
        }

        .btn.btn-outline:hover {
            background-color: var(--primary);
            color: white;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Pop-up Generator</h1>
        <p>Design your responsive announcement pop-up and grab the code instantly.</p>
    </div>

    <div class="container">
        <div class="panel">
            <h2>1. Configure Settings</h2>
            
            <div class="form-group">
                <label for="delay">Appearance Timing</label>
                <select id="delay" class="form-control">
                    <option value="0">Immediate (Active until closed)</option>
                    <option value="10000">After 10 Seconds</option>
                    <option value="15000">After 15 Seconds</option>
                    <option value="20000">After 20 Seconds</option>
                    <option value="30000">After 30 Seconds</option>
                </select>
            </div>

            <div class="form-group">
                <label for="animation">Animation Style</label>
                <select id="animation" class="form-control">
                    <option value="fade">Fade In</option>
                    <option value="slide">Slide In (Bottom)</option>
                    <option value="zoom">Zoom In</option>
                    <option value="bounce">Bounce</option>
                </select>
            </div>

            <div class="form-group">
                <label for="imageSrc">Image Source / Canva Link</label>
                <input type="text" id="imageSrc" class="form-control" placeholder="https://example.com/image.jpg or Canva link">
                <div class="help-text">Supports direct image URLs (JPG/PNG) or standard Canva.com share links.</div>
            </div>

            <div class="form-group">
                <label for="title">Pop-up Title</label>
                <input type="text" id="title" class="form-control" value="Special Announcement!">
            </div>

            <div class="form-group">
                <label for="message">Pop-up Message</label>
                <input type="text" id="message" class="form-control" value="Don't miss out on our latest updates and exclusive offers.">
            </div>

            <div class="form-group">
                <label for="btnText">Button Text</label>
                <input type="text" id="btnText" class="form-control" value="Learn More">
            </div>
            
            <div class="form-group">
                <label for="btnLink">Button URL</label>
                <input type="text" id="btnLink" class="form-control" value="https://yoursite.com">
            </div>
        </div>

        <div class="panel">
            <h2>2. Get Your Code</h2>
            <textarea id="outputCode" class="form-control" readonly></textarea>
            <button class="btn btn-outline" id="copyBtn" onclick="copyCode()">Copy Code to Clipboard</button>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('input, select');
        const outputCode = document.getElementById('outputCode');

        // Animation CSS Templates
        const animations = {
            fade: `@keyframes popAnim { from { opacity: 0; } to { opacity: 1; } }`,
            slide: `@keyframes popAnim { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }`,
            zoom: `@keyframes popAnim { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }`,
            bounce: `@keyframes popAnim { 
                0% { opacity: 0; transform: scale(0.3); } 
                50% { opacity: 1; transform: scale(1.05); } 
                70% { transform: scale(0.9); } 
                100% { opacity: 1; transform: scale(1); } 
            }`
        };

        function generateMediaElement(src) {
            if (!src) return '';
            
            // Check if it's a Canva link
            if (src.includes('canva.com/design')) {
                // Ensure it formats as an embed link
                const embedSrc = src.split('?')[0] + '?embed';
                return `
        <div class="announcement-media" style="position: relative; width: 100%; height: 0; padding-top: 56.2500%; padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden; border-radius: 8px; will-change: transform;">
            <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;" src="${embedSrc}" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
        </div>`;
            }
            
            // Standard Image
            return `
        <div class="announcement-media">
            <img src="${src}" alt="Announcement Image" style="width: 100%; height: auto; border-radius: 8px; display: block;">
        </div>`;
        }

        function updateCode() {
            const delay = document.getElementById('delay').value;
            const animType = document.getElementById('animation').value;
            const imageSrc = document.getElementById('imageSrc').value;
            const title = document.getElementById('title').value;
            const message = document.getElementById('message').value;
            const btnText = document.getElementById('btnText').value;
            const btnLink = document.getElementById('btnLink').value;

            const mediaHTML = generateMediaElement(imageSrc);
            const keyframes = animations[animType];

            const template = `<div id="custom-announcement-overlay" class="announcement-overlay">
    <div class="announcement-modal">
        <button id="announcement-close" class="announcement-close">&times;</button>
        ${mediaHTML}
        <div class="announcement-content">
            <h2 class="announcement-title">${title}</h2>
            <p class="announcement-text">${message}</p>
            <a href="${btnLink}" class="announcement-btn" target="_blank">${btnText}</a>
        </div>
    </div>
</div>

<style>
    .announcement-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none; /* Hidden by default */
        justify-content: center;
        align-items: center;
        z-index: 999999;
        padding: 20px;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .announcement-modal {
        background: #ffffff;
        width: 100%;
        max-width: 500px;
        border-radius: 16px;
        position: relative;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        padding: 24px;
        box-sizing: border-box;
        animation: popAnim 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    ${keyframes}

    .announcement-close {
        position: absolute;
        top: 12px;
        right: 16px;
        background: none;
        border: none;
        font-size: 28px;
        line-height: 1;
        color: #64748b;
        cursor: pointer;
        z-index: 10;
        transition: color 0.2s;
    }

    .announcement-close:hover {
        color: #0f172a;
    }

    .announcement-content {
        text-align: center;
        margin-top: ${imageSrc ? '20px' : '10px'};
    }

    .announcement-title {
        font-size: 1.5rem;
        color: #0f172a;
        margin: 0 0 12px 0;
        font-weight: 700;
    }

    .announcement-text {
        color: #475569;
        font-size: 1rem;
        line-height: 1.5;
        margin: 0 0 24px 0;
    }

    .announcement-btn {
        display: inline-block;
        background: #4f46e5;
        color: #ffffff;
        text-decoration: none;
        padding: 12px 32px;
        border-radius: 8px;
        font-weight: 600;
        transition: background 0.2s;
        width: 100%;
        box-sizing: border-box;
    }

    .announcement-btn:hover {
        background: #4338ca;
    }

    @media (max-width: 480px) {
        .announcement-modal {
            padding: 20px;
        }
        .announcement-title {
            font-size: 1.25rem;
        }
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var overlay = document.getElementById("custom-announcement-overlay");
        var closeBtn = document.getElementById("announcement-close");
        var delayTime = ${delay};

        // Check if user has already closed it in this session (optional logic)
        if (!sessionStorage.getItem("popupClosed")) {
            setTimeout(function() {
                overlay.style.display = "flex";
            }, delayTime);
        }

        // Close logic
        closeBtn.addEventListener("click", function() {
            overlay.style.display = "none";
            sessionStorage.setItem("popupClosed", "true");
        });

        // Close on clicking outside
        overlay.addEventListener("click", function(e) {
            if (e.target === overlay) {
                overlay.style.display = "none";
                sessionStorage.setItem("popupClosed", "true");
            }
        });
    });
<\/script>`;

            outputCode.value = template;
        }

        function copyCode() {
            outputCode.select();
            document.execCommand('copy');
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = originalText; }, 2000);
        }

        // Add event listeners to update code on input change
        inputs.forEach(input => {
            input.addEventListener('input', updateCode);
            input.addEventListener('change', updateCode);
        });

        // Initial generation
        updateCode();
    </script>
</body>
</html>
